  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"f64c89cb-5c62-49cb-a4ac-be4f2a8e573a\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<script src=\"4b2da2a1-c1c9-438a-b8c9-a73cef95f2a3\"><\u002Fscript>\n<script src=\"46f159d6-615d-4f22-a99a-a78da91ef220\"><\u002Fscript>\n<style>\n  html{scroll-behavior:smooth}\n  html,body{margin:0;background:#07090d}\n  *{box-sizing:border-box}\n  a{color:#8fd3c0;text-decoration:none}a:hover{color:#bfeadd}\n  .navlink{color:#93a0b2;font-size:13px;transition:color .15s}.navlink:hover{color:#e7ecf2}\n  select{outline:none}\n  ::-webkit-scrollbar{width:8px;height:8px}\n  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:4px}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100%;font-family:'Space Grotesk',system-ui,sans-serif;color:#e7ecf2;background:radial-gradient(1100px 720px at 50% -8%, #111c2b 0%, #07090d 58%)\">\n\n  <!-- ===== Nav ===== -->\n  <nav style=\"position:sticky;top:0;z-index:60;display:flex;align-items:center;justify-content:space-between;padding:15px 32px;border-bottom:1px solid rgba(255,255,255,.07);background:rgba(9,12,17,.72);backdrop-filter:blur(14px)\">\n    <div style=\"display:flex;align-items:center;gap:11px\">\n      <div style=\"width:11px;height:11px;border-radius:50%;background:#5be0b0;box-shadow:0 0 14px #5be0b0\"><\u002Fdiv>\n      <div style=\"font-size:15px;font-weight:600;letter-spacing:.2px\">Spatial TME Atlas<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:26px\">\n      <a class=\"navlink\" href=\"#overview\">Overview<\u002Fa>\n      <a class=\"navlink\" href=\"#explorer\">Explorer<\u002Fa>\n      <a class=\"navlink\" href=\"#methods\">Methods<\u002Fa>\n      <a class=\"navlink\" href=\"#guide\">Guide<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <!-- ===== Hero ===== -->\n  <section style=\"max-width:1080px;margin:0 auto;padding:104px 32px 64px\">\n    <div style=\"font-size:11px;letter-spacing:2.4px;text-transform:uppercase;color:#5be0b0;font-family:'IBM Plex Mono',monospace;margin-bottom:22px\">Spatial transcriptomics · 10x Visium<\u002Fdiv>\n    <h1 style=\"font-size:52px;line-height:1.06;font-weight:700;letter-spacing:-1px;margin:0 0 24px;max-width:16ch;text-wrap:balance\">The tumor microenvironment, reconstructed in 3D.<\u002Fh1>\n    <p style=\"font-size:18px;line-height:1.6;color:#aeb9c8;max-width:60ch;margin:0 0 32px\">A spatial atlas of biliary tract cancer that stacks Visium tissue sections into a navigable 3D model — classifying every spot, tracing the tumor–immune invasive front, and comparing the same tumor <em style=\"color:#e7ecf2;font-style:normal;font-weight:500\">before and after treatment<\u002Fem>.<\u002Fp>\n    <div style=\"display:flex;flex-wrap:wrap;gap:9px;margin-bottom:38px\">\n      <span style=\"font-size:12px;font-family:'IBM Plex Mono',monospace;color:#9fb0c8;padding:6px 13px;border:1px solid rgba(255,255,255,.13);border-radius:999px\">GSE316402<\u002Fspan>\n      <span style=\"font-size:12px;font-family:'IBM Plex Mono',monospace;color:#9fb0c8;padding:6px 13px;border:1px solid rgba(255,255,255,.13);border-radius:999px\">biliary tract cancer<\u002Fspan>\n      <span style=\"font-size:12px;font-family:'IBM Plex Mono',monospace;color:#9fb0c8;padding:6px 13px;border:1px solid rgba(255,255,255,.13);border-radius:999px\">pre / post therapy<\u002Fspan>\n      <span style=\"font-size:12px;font-family:'IBM Plex Mono',monospace;color:#9fb0c8;padding:6px 13px;border:1px solid rgba(255,255,255,.13);border-radius:999px\">3 patients<\u002Fspan>\n    <\u002Fdiv>\n    <a href=\"#explorer\" style=\"display:inline-flex;align-items:center;gap:9px;padding:13px 22px;border-radius:11px;background:#5be0b0;color:#06231a;font-weight:600;font-size:14px\">Open the 3D explorer<span style=\"font-size:16px\">→<\u002Fspan><\u002Fa>\n  <\u002Fsection>\n\n  <!-- ===== Overview ===== -->\n  <section id=\"overview\" style=\"scroll-margin-top:70px;border-top:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.015)\">\n    <div style=\"max-width:1080px;margin:0 auto;padding:64px 32px;display:grid;grid-template-columns:220px 1fr;gap:48px\">\n      <div>\n        <div style=\"font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#5be0b0;font-family:'IBM Plex Mono',monospace;margin-bottom:10px\">01 / Abstract<\u002Fdiv>\n        <div style=\"font-size:24px;font-weight:600\">Overview<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <p style=\"font-size:16.5px;line-height:1.7;color:#c2cbd8;margin:0 0 18px\">Solid tumors are ecosystems. Where malignant epithelium meets infiltrating immune cells — the <strong style=\"color:#e7ecf2;font-weight:600\">invasive front<\u002Fstrong> — is where response and resistance to therapy are decided.<\u002Fp>\n        <p style=\"font-size:16.5px;line-height:1.7;color:#c2cbd8;margin:0 0 30px\">We profile biliary tumors with 10x Visium, then run a spot-level pipeline: quality control, marker-based classification into tumor / immune / stromal / transitional niches, spatial-domain clustering, and detection of the tumor–immune interface. Replicate sections are stacked into a pseudo-3D model, and matched pre- and post-treatment biopsies are placed side by side.<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px\">\n          <div style=\"border-left:2px solid rgba(91,224,176,.5);padding-left:13px\"><div style=\"font-size:13px;font-weight:600;margin-bottom:4px\">Spot<\u002Fdiv><div style=\"font-size:12.5px;line-height:1.5;color:#8b95a5\">A ~55µm Visium capture area — a small multicellular neighborhood, not a single cell.<\u002Fdiv><\u002Fdiv>\n          <div style=\"border-left:2px solid rgba(91,224,176,.5);padding-left:13px\"><div style=\"font-size:13px;font-weight:600;margin-bottom:4px\">Invasive front<\u002Fdiv><div style=\"font-size:12.5px;line-height:1.5;color:#8b95a5\">Tumor spots that directly touch immune spots on the spatial graph.<\u002Fdiv><\u002Fdiv>\n          <div style=\"border-left:2px solid rgba(91,224,176,.5);padding-left:13px\"><div style=\"font-size:13px;font-weight:600;margin-bottom:4px\">TLS<\u002Fdiv><div style=\"font-size:12.5px;line-height:1.5;color:#8b95a5\">Tertiary lymphoid structures — organized immune aggregates scored by a 12-chemokine signature.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== Explorer ===== -->\n  <section id=\"explorer\" style=\"scroll-margin-top:70px;max-width:1460px;margin:0 auto;padding:56px 24px 40px\">\n    <div style=\"display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:20px;padding:0 4px\">\n      <div>\n        <div style=\"font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#5be0b0;font-family:'IBM Plex Mono',monospace;margin-bottom:9px\">02 / Explorer<\u002Fdiv>\n        <div style=\"font-size:24px;font-weight:600\">Explore the atlas<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:13px;color:#8b95a5;max-width:44ch;line-height:1.5\">Pick a color mode on the left; both stacks recolor together. Drag to rotate, scroll to zoom, choose a patient in the bar.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"height:clamp(640px,86vh,900px);display:flex;flex-direction:column;background:radial-gradient(1200px 800px at 50% 20%, #0d1420 0%, #07090d 74%);border:1px solid rgba(255,255,255,.09);border-radius:16px;overflow:hidden;box-shadow:0 26px 64px rgba(0,0,0,.5)\">\n\n  <!-- ===== Explorer bar ===== -->\n  <header style=\"flex:none;display:flex;align-items:center;justify-content:space-between;padding:14px 26px;border-bottom:1px solid rgba(255,255,255,.07);background:rgba(9,12,17,.6);backdrop-filter:blur(12px)\">\n    <div style=\"display:flex;align-items:center;gap:22px\">\n      <div style=\"display:flex;align-items:center;gap:11px\">\n        <div style=\"width:11px;height:11px;border-radius:50%;background:#5be0b0;box-shadow:0 0 14px #5be0b0\"><\u002Fdiv>\n        <div style=\"font-size:14px;font-weight:600;letter-spacing:.2px\">3D Explorer<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:12px;color:#7c8798;font-family:'IBM Plex Mono',monospace\">drag to rotate both stacks · synced<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:16px\">\n      <div style=\"display:flex;align-items:center;gap:9px\">\n        <span style=\"font-size:11px;color:#7c8798;font-family:'IBM Plex Mono',monospace\">patient<\u002Fspan>\n        <sc-raw-select value=\"{{ patient }}\" onchange=\"{{ onPatient }}\" style=\"padding:7px 10px;border-radius:9px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);color:#e7ecf2;font-family:'Space Grotesk',sans-serif;font-size:12.5px\">\n          <sc-for list=\"{{ patientOptions }}\" as=\"p\" hint-placeholder-count=\"3\">\n            <option value=\"{{ p.value }}\">{{ p.label }}<\u002Foption>\n          <\u002Fsc-for>\n        <\u002Fsc-raw-select>\n      <\u002Fdiv>\n      <div style=\"font-size:10.5px;font-family:'IBM Plex Mono',monospace;color:#6a7688;text-align:right;line-height:1.5\">\n        <div style=\"color:#8b95a5\">Visium · GSE316402<\u002Fdiv>\n        <div>biliary tract cancer<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ===== Body ===== -->\n  <div style=\"flex:1;display:flex;min-height:0\">\n\n    <!-- Left control rail -->\n    <aside style=\"flex:none;width:236px;padding:16px;display:flex;flex-direction:column;gap:14px;overflow-y:auto;border-right:1px solid rgba(255,255,255,.07)\">\n      <div style=\"flex:none\">\n        <div style=\"font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:#7c8798;font-family:'IBM Plex Mono',monospace;margin-bottom:11px\">Color by<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:6px\">\n          <sc-for list=\"{{ modes }}\" as=\"m\" hint-placeholder-count=\"6\">\n            <button onclick=\"{{ m.onSelect }}\" style=\"{{ m.style }}\">\n              <span style=\"width:11px;height:11px;border-radius:3px;background:{{ m.swatch }};flex:none\"><\u002Fspan>\n              <span style=\"display:flex;flex-direction:column;align-items:flex-start;line-height:1.25\">\n                <span style=\"font-size:13px;font-weight:500\">{{ m.name }}<\u002Fspan>\n                <span style=\"font-size:10px;font-family:'IBM Plex Mono',monospace;color:#7c8798\">{{ m.kind }}<\u002Fspan>\n              <\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"flex:none;border-top:1px solid rgba(255,255,255,.08);padding-top:15px\">\n        <div style=\"font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:#7c8798;font-family:'IBM Plex Mono',monospace;margin-bottom:12px\">Display<\u002Fdiv>\n\n        <div style=\"font-size:11px;color:#aab4c2;margin-bottom:6px;display:flex;justify-content:space-between\"><span>Point size<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;color:#7c8798\">{{ pointSize }}<\u002Fspan><\u002Fdiv>\n        <input type=\"range\" min=\"1\" max=\"8\" step=\"0.5\" value=\"{{ pointSize }}\" oninput=\"{{ onPointSize }}\" style=\"width:100%;accent-color:#5be0b0;margin-bottom:13px\">\n\n        <div style=\"font-size:11px;color:#aab4c2;margin-bottom:6px;display:flex;justify-content:space-between\"><span>Section spacing<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;color:#7c8798\">{{ spacingLabel }}<\u002Fspan><\u002Fdiv>\n        <input type=\"range\" min=\"0\" max=\"3\" step=\"0.1\" value=\"{{ spacing }}\" oninput=\"{{ onSpacing }}\" style=\"width:100%;accent-color:#5be0b0;margin-bottom:13px\">\n\n        <div style=\"font-size:11px;color:#aab4c2;margin-bottom:6px;display:flex;justify-content:space-between\"><span>Score threshold<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;color:#7c8798\">{{ thresholdLabel }}<\u002Fspan><\u002Fdiv>\n        <input type=\"range\" min=\"0\" max=\"0.9\" step=\"0.05\" value=\"{{ threshold }}\" oninput=\"{{ onThreshold }}\" style=\"width:100%;accent-color:#5be0b0;margin-bottom:15px\">\n\n        <label style=\"display:flex;align-items:center;justify-content:space-between;font-size:12px;color:#aab4c2;cursor:pointer;margin-bottom:10px\">\n          <span>Highlight front<\u002Fspan>\n          <input type=\"checkbox\" checked=\"{{ highlightFront }}\" onchange=\"{{ onHighlightFront }}\" style=\"accent-color:#5be0b0;width:16px;height:16px\">\n        <\u002Flabel>\n        <label style=\"display:flex;align-items:center;justify-content:space-between;font-size:12px;color:#aab4c2;cursor:pointer;margin-bottom:10px\">\n          <span>Section outlines<\u002Fspan>\n          <input type=\"checkbox\" checked=\"{{ showOutlines }}\" onchange=\"{{ onOutlines }}\" style=\"accent-color:#5be0b0;width:16px;height:16px\">\n        <\u002Flabel>\n        <label style=\"display:flex;align-items:center;justify-content:space-between;font-size:12px;color:#aab4c2;cursor:pointer\">\n          <span>Auto-rotate<\u002Fspan>\n          <input type=\"checkbox\" checked=\"{{ autoRotate }}\" onchange=\"{{ onAutoRotate }}\" style=\"accent-color:#5be0b0;width:16px;height:16px\">\n        <\u002Flabel>\n      <\u002Fdiv>\n\n      <div style=\"flex:none;border-top:1px solid rgba(255,255,255,.08);padding-top:15px\">\n        <div style=\"font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:#7c8798;font-family:'IBM Plex Mono',monospace;margin-bottom:11px\">{{ legendTitle }}<\u002Fdiv>\n        <sc-if value=\"{{ legendIsContinuous }}\" hint-placeholder-val=\"{{ true }}\">\n          <div>\n            <div style=\"width:100%;height:10px;border-radius:5px;background:linear-gradient(90deg,#000004,#3b0f70,#8c2981,#de4968,#fe9f6d,#fcfdbf)\"><\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;font-size:10px;font-family:'IBM Plex Mono',monospace;color:#7c8798;margin-top:5px\"><span>low<\u002Fspan><span>high<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ legendIsCategorical }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex;flex-direction:column;gap:7px\">\n            <sc-for list=\"{{ legendItems }}\" as=\"l\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex;align-items:center;gap:9px;font-size:12px;color:#c6cfda\"><span style=\"width:11px;height:11px;border-radius:3px;background:{{ l.color }}\"><\u002Fspan>{{ l.label }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Faside>\n\n    <!-- Viewers + comparison -->\n    <div style=\"flex:1;display:flex;flex-direction:column;min-width:0\">\n\n      <div style=\"flex:1;position:relative;display:flex;min-height:0\">\n        <!-- BEFORE -->\n        <section data-screen-label=\"Before treatment\" style=\"flex:1;position:relative;min-width:0;border-right:1px solid rgba(255,255,255,.09)\">\n          <canvas ref=\"{{ canvasRefPre }}\" style=\"position:absolute;inset:0;width:100%;height:100%;display:block\"><\u002Fcanvas>\n          <div style=\"position:absolute;top:16px;left:18px;pointer-events:none\">\n            <div style=\"display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border-radius:999px;background:rgba(80,120,220,.16);border:1px solid rgba(120,160,240,.35)\">\n              <span style=\"width:8px;height:8px;border-radius:50%;background:#6a9bf0\"><\u002Fspan>\n              <span style=\"font-size:12px;font-weight:600;letter-spacing:.4px\">BEFORE<\u002Fspan>\n              <span style=\"font-size:10.5px;font-family:'IBM Plex Mono',monospace;color:#9fb0c8\">baseline biopsy<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-size:10.5px;font-family:'IBM Plex Mono',monospace;color:#6a7688;margin-top:7px;padding-left:2px\">{{ preSpots }} spots · {{ nSections }} sections<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n        <!-- AFTER -->\n        <section data-screen-label=\"After treatment\" style=\"flex:1;position:relative;min-width:0\">\n          <canvas ref=\"{{ canvasRefPost }}\" style=\"position:absolute;inset:0;width:100%;height:100%;display:block\"><\u002Fcanvas>\n          <div style=\"position:absolute;top:16px;left:18px;pointer-events:none\">\n            <div style=\"display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border-radius:999px;background:rgba(91,224,176,.14);border:1px solid rgba(91,224,176,.35)\">\n              <span style=\"width:8px;height:8px;border-radius:50%;background:#5be0b0\"><\u002Fspan>\n              <span style=\"font-size:12px;font-weight:600;letter-spacing:.4px\">AFTER<\u002Fspan>\n              <span style=\"font-size:10.5px;font-family:'IBM Plex Mono',monospace;color:#9fcbb9\">on-treatment biopsy<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-size:10.5px;font-family:'IBM Plex Mono',monospace;color:#6a7688;margin-top:7px;padding-left:2px\">{{ postSpots }} spots · {{ nSections }} sections<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n        <!-- shared orbit overlay -->\n        <div ref=\"{{ overlayRef }}\" style=\"position:absolute;inset:0;cursor:grab\"><\u002Fdiv>\n        <div style=\"position:absolute;bottom:12px;left:50%;transform:translateX(-50%);pointer-events:none;font-size:10.5px;font-family:'IBM Plex Mono',monospace;color:#59657a\">drag to rotate both · scroll to zoom · views are synced<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Comparison strip -->\n      <div style=\"flex:none;border-top:1px solid rgba(255,255,255,.08);background:rgba(9,12,17,.55);padding:14px 20px 16px\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:11px\">\n          <div style=\"font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:#7c8798;font-family:'IBM Plex Mono',monospace\">Treatment response · post − pre<\u002Fdiv>\n          <div style=\"font-size:10.5px;font-family:'IBM Plex Mono',monospace;color:#59657a\">interface signaling = mean z at tumor–immune front<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:12px\">\n          <sc-for list=\"{{ comparison }}\" as=\"c\" hint-placeholder-count=\"6\">\n            <div style=\"flex:1;min-width:0;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:11px;padding:11px 13px\">\n              <div style=\"font-size:11px;color:#aab4c2;margin-bottom:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ c.label }}<\u002Fdiv>\n              <div style=\"display:flex;align-items:baseline;gap:7px\">\n                <span style=\"font-size:13px;font-family:'IBM Plex Mono',monospace;color:#8b95a5\">{{ c.pre }}<\u002Fspan>\n                <span style=\"font-size:12px;color:#59657a\">→<\u002Fspan>\n                <span style=\"font-size:16px;font-weight:600;font-family:'IBM Plex Mono',monospace;color:#e7ecf2\">{{ c.post }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"margin-top:7px;display:inline-flex;align-items:center;gap:5px;font-size:11px;font-family:'IBM Plex Mono',monospace;color:{{ c.deltaColor }}\">\n                <span>{{ c.arrow }}<\u002Fspan><span>{{ c.delta }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== Methods ===== -->\n  <section id=\"methods\" style=\"scroll-margin-top:70px;border-top:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.015)\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:64px 32px\">\n      <div style=\"font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#5be0b0;font-family:'IBM Plex Mono',monospace;margin-bottom:10px\">03 / Pipeline<\u002Fdiv>\n      <div style=\"font-size:24px;font-weight:600;margin-bottom:32px\">From counts to a navigable tumor<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px\">\n        <div style=\"background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:13px;padding:20px\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#5be0b0;margin-bottom:10px\">01<\u002Fdiv><div style=\"font-size:15px;font-weight:600;margin-bottom:7px\">QC &amp; normalization<\u002Fdiv><div style=\"font-size:13px;line-height:1.6;color:#8b95a5\">Filter shallow / high-mito spots, drop rare genes, then library-size normalize (CP10k) and log-transform.<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:13px;padding:20px\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#5be0b0;margin-bottom:10px\">02<\u002Fdiv><div style=\"font-size:15px;font-weight:600;margin-bottom:7px\">Spot classification<\u002Fdiv><div style=\"font-size:13px;line-height:1.6;color:#8b95a5\">Score lineage marker panels per spot and assign a niche: tumor, immune, stromal, or transitional.<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:13px;padding:20px\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#5be0b0;margin-bottom:10px\">03<\u002Fdiv><div style=\"font-size:15px;font-weight:600;margin-bottom:7px\">Spatial domains<\u002Fdiv><div style=\"font-size:13px;line-height:1.6;color:#8b95a5\">Leiden clustering on a kNN graph groups spots into coherent tissue domains labelled by dominant class.<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:13px;padding:20px\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#5be0b0;margin-bottom:10px\">04<\u002Fdiv><div style=\"font-size:15px;font-weight:600;margin-bottom:7px\">Invasive front<\u002Fdiv><div style=\"font-size:13px;line-height:1.6;color:#8b95a5\">On the spatial neighbor graph, flag tumor spots touching immune spots (and vice-versa) as the interface.<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:13px;padding:20px\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#5be0b0;margin-bottom:10px\">05<\u002Fdiv><div style=\"font-size:15px;font-weight:600;margin-bottom:7px\">Interface signaling &amp; TLS<\u002Fdiv><div style=\"font-size:13px;line-height:1.6;color:#8b95a5\">Score checkpoint (PD1/PD-L1), CXCL12–CXCR4 and TGF-β at the front; map tertiary lymphoid structures.<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:13px;padding:20px\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#5be0b0;margin-bottom:10px\">06<\u002Fdiv><div style=\"font-size:15px;font-weight:600;margin-bottom:7px\">3D stacking &amp; pre/post<\u002Fdiv><div style=\"font-size:13px;line-height:1.6;color:#8b95a5\">Stack replicate sections into a pseudo-3D model and compare matched baseline vs on-treatment biopsies.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== Guide ===== -->\n  <section id=\"guide\" style=\"scroll-margin-top:70px\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:64px 32px\">\n      <div style=\"font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#5be0b0;font-family:'IBM Plex Mono',monospace;margin-bottom:10px\">04 / Reading the atlas<\u002Fdiv>\n      <div style=\"font-size:24px;font-weight:600;margin-bottom:32px\">What each color mode shows<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:14px\">\n        <div style=\"display:flex;gap:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:13px;padding:18px\"><span style=\"width:13px;height:13px;border-radius:3px;background:#e84a4c;flex:none;margin-top:3px\"><\u002Fspan><div><div style=\"font-size:14px;font-weight:600;margin-bottom:5px\">Cell-type class<\u002Fdiv><div style=\"font-size:13px;line-height:1.6;color:#8b95a5\">Every spot colored by its niche — tumor, immune, stromal, transitional. The overall tissue architecture.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;gap:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:13px;padding:18px\"><span style=\"width:13px;height:13px;border-radius:3px;background:#5be0b0;flex:none;margin-top:3px\"><\u002Fspan><div><div style=\"font-size:14px;font-weight:600;margin-bottom:5px\">Invasive front<\u002Fdiv><div style=\"font-size:13px;line-height:1.6;color:#8b95a5\">Highlights tumor core, immune zones, and the green interface band where they collide.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;gap:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:13px;padding:18px\"><span style=\"width:13px;height:13px;border-radius:3px;background:#de4968;flex:none;margin-top:3px\"><\u002Fspan><div><div style=\"font-size:14px;font-weight:600;margin-bottom:5px\">Checkpoint (PD1/PD-L1)<\u002Fdiv><div style=\"font-size:13px;line-height:1.6;color:#8b95a5\">Immune-checkpoint signaling — where the tumor may be suppressing an anti-tumor response.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;gap:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:13px;padding:18px\"><span style=\"width:13px;height:13px;border-radius:3px;background:#8c2981;flex:none;margin-top:3px\"><\u002Fspan><div><div style=\"font-size:14px;font-weight:600;margin-bottom:5px\">CXCL12–CXCR4<\u002Fdiv><div style=\"font-size:13px;line-height:1.6;color:#8b95a5\">A chemokine axis linked to immune exclusion and stromal recruitment at the tumor edge.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;gap:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:13px;padding:18px\"><span style=\"width:13px;height:13px;border-radius:3px;background:#fe9f6d;flex:none;margin-top:3px\"><\u002Fspan><div><div style=\"font-size:14px;font-weight:600;margin-bottom:5px\">TGF-β<\u002Fdiv><div style=\"font-size:13px;line-height:1.6;color:#8b95a5\">Immunosuppressive stromal program that can blunt therapy — concentrated in fibrotic regions.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;gap:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:13px;padding:18px\"><span style=\"width:13px;height:13px;border-radius:3px;background:#fcfdbf;flex:none;margin-top:3px\"><\u002Fspan><div><div style=\"font-size:14px;font-weight:600;margin-bottom:5px\">TLS signature<\u002Fdiv><div style=\"font-size:13px;line-height:1.6;color:#8b95a5\">Lights up organized immune aggregates — a candidate marker of favorable response.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== Footer ===== -->\n  <footer style=\"border-top:1px solid rgba(255,255,255,.07);background:rgba(9,12,17,.5)\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:36px 32px;display:flex;flex-wrap:wrap;gap:24px;justify-content:space-between;align-items:flex-start\">\n      <div style=\"display:flex;align-items:center;gap:11px\">\n        <div style=\"width:10px;height:10px;border-radius:50%;background:#5be0b0\"><\u002Fdiv>\n        <div style=\"font-size:13px;font-weight:600\">Spatial TME Atlas<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:12px;line-height:1.7;color:#8b95a5;max-width:62ch;font-family:'IBM Plex Mono',monospace\">Data: 10x Visium, GEO GSE316402 (biliary tract cancer). Pipeline: Scanpy spot classification, spatial-graph interface detection, pseudo-3D stacking. Spot positions and scores shown here are illustrative pending wiring of the exported spot table — the layout and metrics mirror the analysis structure.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    mode: \"spot_class\",\n    pointSize: 4,\n    spacing: 1.35,\n    threshold: 0,\n    highlightFront: true,\n    showOutlines: true,\n    autoRotate: true,\n    patient: \"0\",\n  };\n\n  N_SECTIONS = 4;\n  GRID_STEP = 0.088;\n  BASE_R = 2.2;\n\n  CLASS_COLORS = { Tumor:[0.91,0.29,0.30], Immune:[0.30,0.55,0.90], Stromal:[0.96,0.72,0.24], Transitional:[0.68,0.50,0.86] };\n  CLASS_ORDER = [\"Tumor\",\"Immune\",\"Stromal\",\"Transitional\"];\n  CLASS_HEX = { Tumor:\"#e84a4c\", Immune:\"#4d8ce6\", Stromal:\"#f4b83d\", Transitional:\"#ad7fdc\" };\n  FRONT_COLORS = { tumor_core:[0.62,0.26,0.26], immune:[0.24,0.40,0.66], interface:[0.44,0.95,0.55], other:[0.30,0.34,0.40] };\n\n  MODES = [\n    { id:\"spot_class\", name:\"Cell-type class\", kind:\"categorical\",  swatch:\"#e84a4c\" },\n    { id:\"front\",      name:\"Invasive front\",  kind:\"tumor–immune\", swatch:\"#5be0b0\" },\n    { id:\"checkpoint\", name:\"Checkpoint\",       kind:\"PD1 / PD-L1\",  swatch:\"#de4968\" },\n    { id:\"cxcl12\",     name:\"CXCL12–CXCR4\",     kind:\"chemokine\",    swatch:\"#8c2981\" },\n    { id:\"tgfb\",       name:\"TGF-β\",            kind:\"stromal\",      swatch:\"#fe9f6d\" },\n    { id:\"tls\",        name:\"TLS signature\",    kind:\"12-chemokine\", swatch:\"#fcfdbf\" },\n  ];\n\n  PATIENTS = [\"BTC-01\",\"BTC-02\",\"BTC-03\"];\n\n  componentDidMount() { this.viewers = []; this.buildAll(); }\n  componentWillUnmount() {\n    if (this.raf) cancelAnimationFrame(this.raf);\n    (this.viewers||[]).forEach(v => v.renderer && v.renderer.dispose());\n    if (this.onResize) window.removeEventListener(\"resize\", this.onResize);\n  }\n\n  // ---------- noise ----------\n  hash3(i,j,k,seed){ const n=i*127.1+j*311.7+k*74.7+seed*45.3; const s=Math.sin(n)*43758.5453; return s-Math.floor(s); }\n  smooth(t){ return t*t*(3-2*t); }\n  vnoise(x,y,z,seed){\n    const xi=Math.floor(x),yi=Math.floor(y),zi=Math.floor(z);\n    const u=this.smooth(x-xi),v=this.smooth(y-yi),w=this.smooth(z-zi);\n    const L=(a,b,t)=>a+(b-a)*t;\n    const c000=this.hash3(xi,yi,zi,seed),c100=this.hash3(xi+1,yi,zi,seed);\n    const c010=this.hash3(xi,yi+1,zi,seed),c110=this.hash3(xi+1,yi+1,zi,seed);\n    const c001=this.hash3(xi,yi,zi+1,seed),c101=this.hash3(xi+1,yi,zi+1,seed);\n    const c011=this.hash3(xi,yi+1,zi+1,seed),c111=this.hash3(xi+1,yi+1,zi+1,seed);\n    return L(L(L(c000,c100,u),L(c010,c110,u),v),L(L(c001,c101,u),L(c011,c111,u),v),w);\n  }\n  fbm(x,y,z,seed){ let f=0,amp=0.5,freq=1,norm=0; for(let o=0;o<3;o++){ f+=amp*this.vnoise(x*freq,y*freq,z*freq,seed+o*17); norm+=amp; amp*=0.5; freq*=2; } return f/norm; }\n\n  // ---------- spot generation ----------\n  generateSpots(condition, pIdx) {\n    const isPost = condition === \"post\";\n    const ps = pIdx * 7.3;\n    const respScale = 0.75 + pIdx * 0.14;                // per-patient response magnitude\n    const bTumor = isPost ? -0.042 * respScale : 0;\n    const bImmune = isPost ? 0.038 * respScale : 0;\n    const bCkpt = isPost ? -0.10 * respScale : 0;        // checkpoint drops (responder)\n    const bCxcl = isPost ? 0.05 * respScale : 0;         // chemokine axis persists / rises\n    const bTgfb = isPost ? 0.045 * respScale : 0;        // immunosuppressive stroma persists\n    const boundScale = isPost ? 0.93 : 1.0;              // tumor regression → smaller tissue\n    const phaseOff = pIdx * 0.5 + (isPost ? 0.12 : 0);\n\n    const spots = [];\n    const step = this.GRID_STEP, R = this.BASE_R * boundScale;\n    const counts = { Tumor:0, Immune:0, Stromal:0, Transitional:0 };\n    let iCount=0, ckSum=0, cxSum=0, tgSum=0;\n\n    for (let si=0; si<this.N_SECTIONS; si++) {\n      const zc = si*0.62;\n      const phase = si*0.35 + phaseOff;\n      const cx = Math.sin(si*1.3 + ps)*0.12, cy = Math.cos(si*1.7 + ps)*0.10;\n      for (let gx=-R; gx<=R; gx+=step) {\n        for (let gy=-R; gy<=R; gy+=step) {\n          const jx=(this.hash3(gx*97,gy*61,si,7)-0.5)*step*0.9;\n          const jy=(this.hash3(gx*53,gy*89,si,9)-0.5)*step*0.9;\n          const x=gx+jx, y=gy+jy;\n          const ang=Math.atan2(y,x);\n          const bound=R*(1+0.20*Math.sin(3*ang+phase)+0.13*Math.cos(5*ang-phase));\n          if (Math.sqrt(x*x+y*y)>bound) continue;\n\n          const sx=x+cx, sy=y+cy;\n          let tumorF=this.fbm(sx*0.62+3+ps, sy*0.62-2, zc, 1)+bTumor;\n          let immuneF=this.fbm(sx*0.78-11, sy*0.78+7+ps, zc, 2)+bImmune;\n          const stromF=this.fbm(sx*0.5+21, sy*0.5+19+ps, zc, 3);\n\n          const diff=tumorF-immuneF;\n          let cls;\n          if (stromF>0.5 && tumorF<0.52 && immuneF<0.5) cls=\"Stromal\";\n          else if (tumorF>0.55 && diff>0.07) cls=\"Tumor\";\n          else if (immuneF>0.53 && diff<-0.05) cls=\"Immune\";\n          else if (tumorF>0.46 && immuneF>0.46 && Math.abs(diff)<0.07) cls=\"Transitional\";\n          else if (stromF>0.44 && tumorF<0.55 && immuneF<0.53) cls=\"Stromal\";\n          else if (tumorF>=immuneF) cls=\"Tumor\"; else cls=\"Immune\";\n          counts[cls]++;\n\n          const contact=Math.max(0,1-Math.abs(diff)*5)*Math.min(tumorF,immuneF)*2.2;\n          const checkpoint=Math.min(1,Math.max(0,contact*0.9+immuneF*0.15+bCkpt));\n          const cxcl12=Math.min(1,Math.max(0,0.55*tumorF+0.45*stromF+contact*0.2+bCxcl));\n          const tgfb=Math.min(1,Math.max(0,stromF*0.9+(1-Math.max(tumorF,immuneF))*0.3+bTgfb));\n          const tlsField=Math.max(0,(immuneF-0.62)/0.38);\n          const tls=Math.min(1,tlsField*tlsField*1.3);\n          const isInterface=(cls===\"Transitional\")||(contact>0.75&&(cls===\"Tumor\"||cls===\"Immune\"));\n          if (isInterface){ iCount++; ckSum+=checkpoint; cxSum+=cxcl12; tgSum+=tgfb; }\n          const fz=isInterface?\"interface\":(cls===\"Tumor\"?\"tumor_core\":(cls===\"Immune\"?\"immune\":\"other\"));\n          spots.push({ sx, sy, si, cls, checkpoint, cxcl12, tgfb, tls, isInterface, fz });\n        }\n      }\n    }\n    const total=spots.length;\n    const metrics={\n      total,\n      pctTumor: 100*counts.Tumor/total,\n      pctImmune: 100*counts.Immune/total,\n      pctInterface: 100*iCount/total,\n      ckpt: iCount? ckSum/iCount : 0,\n      cxcl12: iCount? cxSum/iCount : 0,\n      tgfb: iCount? tgSum/iCount : 0,\n    };\n    return { spots, metrics };\n  }\n\n  makeSprite(){\n    const c=document.createElement(\"canvas\"); c.width=c.height=64; const g=c.getContext(\"2d\");\n    const gr=g.createRadialGradient(32,32,0,32,32,32);\n    gr.addColorStop(0,\"rgba(255,255,255,1)\"); gr.addColorStop(0.45,\"rgba(255,255,255,0.8)\"); gr.addColorStop(1,\"rgba(255,255,255,0)\");\n    g.fillStyle=gr; g.beginPath(); g.arc(32,32,32,0,Math.PI*2); g.fill();\n    const t=new window.THREE.Texture(c); t.needsUpdate=true; return t;\n  }\n\n  buildAll(){\n    const THREE=window.THREE;\n    if(!THREE||!this.canvasPre||!this.canvasPost||!this.overlayEl){ setTimeout(()=>this.buildAll(),120); return; }\n    const pIdx=parseInt(this.state.patient,10);\n    this.viewers=[\n      this.buildViewer(this.canvasPre, this.generateSpots(\"pre\",pIdx)),\n      this.buildViewer(this.canvasPost, this.generateSpots(\"post\",pIdx)),\n    ];\n\n    // shared driver camera + controls on overlay\n    this.driver=new THREE.PerspectiveCamera(45,1,0.1,100);\n    this.driver.position.set(5.6,3.1,7.8);\n    this.controls=new THREE.OrbitControls(this.driver, this.overlayEl);\n    this.controls.enableDamping=true; this.controls.dampingFactor=0.08;\n    this.controls.rotateSpeed=0.9; this.controls.minDistance=3.5; this.controls.maxDistance=20;\n    this.homePos=this.driver.position.clone();\n\n    this.onResize=()=>{\n      this.viewers.forEach(v=>{\n        const w=v.canvas.clientWidth, h=v.canvas.clientHeight;\n        v.renderer.setSize(w,h,false); v.camera.aspect=w/h; v.camera.updateProjectionMatrix();\n      });\n    };\n    window.addEventListener(\"resize\",this.onResize);\n    this.onResize();\n\n    const loop=()=>{\n      this.raf=requestAnimationFrame(loop);\n      this.controls.autoRotate=this.state.autoRotate; this.controls.autoRotateSpeed=0.7;\n      this.controls.update();\n      this.viewers.forEach(v=>{\n        const w=v.canvas.clientWidth, h=v.canvas.clientHeight;\n        if(w>0 && h>0 && (w!==v._w || h!==v._h)){\n          v._w=w; v._h=h; v.renderer.setSize(w,h,false);\n          v.camera.aspect=w/h; v.camera.updateProjectionMatrix();\n        }\n        v.camera.position.copy(this.driver.position);\n        v.camera.quaternion.copy(this.driver.quaternion);\n        v.renderer.render(v.scene,v.camera);\n      });\n    };\n    loop();\n    this.applyAll(); this.forceUpdate();\n  }\n\n  buildViewer(canvas, data){\n    const THREE=window.THREE;\n    const scene=new THREE.Scene();\n    const camera=new THREE.PerspectiveCamera(45,1,0.1,100);\n    const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true,preserveDrawingBuffer:true});\n    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));\n    scene.add(new THREE.AmbientLight(0xffffff,0.85));\n    const outlineGroup=new THREE.Group(); scene.add(outlineGroup);\n    const v={ canvas, scene, camera, renderer, outlineGroup, spots:data.spots, metrics:data.metrics, geom:null, mat:null, points:null };\n    this.buildGeometry(v);\n    return v;\n  }\n\n  buildGeometry(v){\n    const THREE=window.THREE;\n    if(v.points){ v.scene.remove(v.points); v.geom.dispose(); }\n    const n=v.spots.length;\n    const geom=new THREE.BufferGeometry();\n    geom.setAttribute(\"position\",new THREE.BufferAttribute(new Float32Array(n*3),3));\n    geom.setAttribute(\"color\",new THREE.BufferAttribute(new Float32Array(n*3),3));\n    const mat=v.mat||new THREE.PointsMaterial({size:0.05*this.state.pointSize,vertexColors:true,map:this.makeSprite(),transparent:true,alphaTest:0.12,depthWrite:false});\n    v.geom=geom; v.mat=mat;\n    v.points=new THREE.Points(geom,mat); v.scene.add(v.points);\n    this.updatePositions(v);\n  }\n\n  zFor(si){ return (si-(this.N_SECTIONS-1)/2)*this.state.spacing; }\n\n  updatePositions(v){\n    const pos=v.geom.attributes.position;\n    for(let i=0;i<v.spots.length;i++){ const s=v.spots[i]; pos.setXYZ(i,s.sx,s.sy,this.zFor(s.si)); }\n    pos.needsUpdate=true; this.buildOutlines(v);\n  }\n\n  buildOutlines(v){\n    const THREE=window.THREE;\n    while(v.outlineGroup.children.length) v.outlineGroup.remove(v.outlineGroup.children[0]);\n    if(!this.state.showOutlines) return;\n    // derive boundary from this viewer's own spots span per section is complex;\n    // reuse nominal boundary (post is slightly smaller) via spot max radius per section\n    const R=this.BASE_R, segs=88;\n    for(let si=0; si<this.N_SECTIONS; si++){\n      const phase=si*0.35;\n      const pts=[];\n      for(let k=0;k<=segs;k++){\n        const ang=(k/segs)*Math.PI*2;\n        const bound=R*(1+0.20*Math.sin(3*ang+phase)+0.13*Math.cos(5*ang-phase));\n        pts.push(new THREE.Vector3(Math.cos(ang)*bound,Math.sin(ang)*bound,this.zFor(si)));\n      }\n      const g=new THREE.BufferGeometry().setFromPoints(pts);\n      const m=new THREE.LineBasicMaterial({color:0x2f4258,transparent:true,opacity:0.45});\n      v.outlineGroup.add(new THREE.Line(g,m));\n    }\n  }\n\n  magma(t){\n    const st=[[0.0,0.0,0.015],[0.23,0.06,0.44],[0.55,0.16,0.51],[0.87,0.29,0.41],[0.99,0.62,0.43],[0.99,0.99,0.75]];\n    t=Math.max(0,Math.min(1,t)); const seg=t*(st.length-1),i=Math.floor(seg),f=seg-i;\n    const a=st[i],b=st[Math.min(i+1,st.length-1)];\n    return [a[0]+(b[0]-a[0])*f,a[1]+(b[1]-a[1])*f,a[2]+(b[2]-a[2])*f];\n  }\n\n  applyColor(v){\n    const col=v.geom.attributes.color;\n    const mode=this.state.mode, thr=this.state.threshold, hl=this.state.highlightFront;\n    const keys={checkpoint:\"checkpoint\",cxcl12:\"cxcl12\",tgfb:\"tgfb\",tls:\"tls\"};\n    for(let i=0;i<v.spots.length;i++){\n      const s=v.spots[i]; let r,g,b,dim=1;\n      if(mode===\"spot_class\"){ const c=this.CLASS_COLORS[s.cls]; r=c[0];g=c[1];b=c[2]; }\n      else if(mode===\"front\"){ const c=this.FRONT_COLORS[s.fz]; r=c[0];g=c[1];b=c[2]; }\n      else { const val=s[keys[mode]]; const c=this.magma(val); r=c[0];g=c[1];b=c[2]; if(val<thr) dim=0.06; }\n      if(hl && s.isInterface && mode!==\"front\"){ r=r*0.35+0.44; g=g*0.35+0.62; b=b*0.35+0.30; }\n      col.setXYZ(i,r*dim,g*dim,b*dim);\n    }\n    col.needsUpdate=true;\n  }\n\n  applyAll(){ (this.viewers||[]).forEach(v=>this.applyColor(v)); }\n  updatePositionsAll(){ (this.viewers||[]).forEach(v=>this.updatePositions(v)); }\n  buildOutlinesAll(){ (this.viewers||[]).forEach(v=>this.buildOutlines(v)); }\n\n  regenPatient(){\n    const pIdx=parseInt(this.state.patient,10);\n    if(!this.viewers||!this.viewers.length) return;\n    const pre=this.generateSpots(\"pre\",pIdx), post=this.generateSpots(\"post\",pIdx);\n    this.viewers[0].spots=pre.spots; this.viewers[0].metrics=pre.metrics;\n    this.viewers[1].spots=post.spots; this.viewers[1].metrics=post.metrics;\n    this.buildGeometry(this.viewers[0]); this.buildGeometry(this.viewers[1]);\n    this.applyAll(); this.forceUpdate();\n  }\n\n  renderVals(){\n    const s=this.state;\n    const continuous=[\"checkpoint\",\"cxcl12\",\"tgfb\",\"tls\"].includes(s.mode);\n    const pre=this.viewers&&this.viewers[0]?this.viewers[0].metrics:null;\n    const post=this.viewers&&this.viewers[1]?this.viewers[1].metrics:null;\n\n    const modes=this.MODES.map(md=>({\n      name:md.name, kind:md.kind, swatch:md.swatch,\n      onSelect:()=>this.setState({mode:md.id},()=>this.applyAll()),\n      style:`display:flex;align-items:center;gap:9px;width:100%;padding:9px 11px;border-radius:9px;cursor:pointer;text-align:left;font-family:'Space Grotesk',sans-serif;border:1px solid ${md.id===s.mode?'rgba(91,224,176,.5)':'rgba(255,255,255,.07)'};background:${md.id===s.mode?'rgba(91,224,176,.12)':'rgba(255,255,255,.02)'};color:#e7ecf2`,\n    }));\n\n    const fmtPct=x=>x==null?\"—\":x.toFixed(1)+\"%\";\n    const fmtIdx=x=>x==null?\"—\":x.toFixed(2);\n    const cardDefs=[\n      {label:\"Tumor area\",              key:\"pctTumor\",     fmt:fmtPct, good:\"down\", unit:\"pp\"},\n      {label:\"Immune infiltration\",     key:\"pctImmune\",    fmt:fmtPct, good:\"up\",   unit:\"pp\"},\n      {label:\"Tumor–immune interface\",  key:\"pctInterface\", fmt:fmtPct, good:\"up\",   unit:\"pp\"},\n      {label:\"Interface checkpoint\",    key:\"ckpt\",         fmt:fmtIdx, good:\"down\", unit:\"\"},\n      {label:\"Interface CXCL12–CXCR4\",  key:\"cxcl12\",       fmt:fmtIdx, good:\"up\",   unit:\"\"},\n      {label:\"Interface TGF-β\",         key:\"tgfb\",         fmt:fmtIdx, good:\"up\",   unit:\"\"},\n    ];\n    const comparison=cardDefs.map(d=>{\n      const pv=pre?pre[d.key]:null, qv=post?post[d.key]:null;\n      let delta=\"—\", arrow=\"\", color=\"#59657a\";\n      if(pv!=null&&qv!=null){\n        const dd=qv-pv;\n        const isPct=d.unit===\"pp\";\n        const mag=isPct?Math.abs(dd).toFixed(1)+\" pp\":Math.abs(dd).toFixed(2);\n        arrow=dd>0.0005?\"▲\":(dd<-0.0005?\"▼\":\"—\");\n        delta=(dd>0?\"+\":dd<0?\"−\":\"\")+mag;\n        const favorable=(d.good===\"down\"&&dd<0)||(d.good===\"up\"&&dd>0);\n        color=Math.abs(dd)<(isPct?0.2:0.01)?\"#7c8798\":(favorable?\"#5be0b0\":\"#f0a24d\");\n      }\n      return { label:d.label, pre:d.fmt(pv), post:d.fmt(qv), delta, arrow, deltaColor:color };\n    });\n\n    const legendMap={spot_class:\"Cell-type class\",front:\"Invasive front\",checkpoint:\"Checkpoint (PD1/PD-L1)\",cxcl12:\"CXCL12–CXCR4\",tgfb:\"TGF-β\",tls:\"TLS signature\"};\n    const frontItems=[{label:\"Tumor core\",color:\"#a15a5a\"},{label:\"Interface\",color:\"#5be08c\"},{label:\"Immune\",color:\"#4d7bc4\"},{label:\"Other / stromal\",color:\"#565f6d\"}];\n    const legendItems=s.mode===\"front\"?frontItems:this.CLASS_ORDER.map(k=>({label:k,color:this.CLASS_HEX[k]}));\n\n    const patientOptions=this.PATIENTS.map((p,i)=>({value:String(i),label:p}));\n\n    return {\n      canvasRefPre:(el)=>{this.canvasPre=el;},\n      canvasRefPost:(el)=>{this.canvasPost=el;},\n      overlayRef:(el)=>{this.overlayEl=el;},\n      patient:s.patient, patientOptions,\n      nSections:this.N_SECTIONS,\n      preSpots: pre?(pre.total/1000).toFixed(1)+\"k\":\"…\",\n      postSpots: post?(post.total/1000).toFixed(1)+\"k\":\"…\",\n      modes, comparison,\n      pointSize:s.pointSize,\n      spacing:s.spacing, spacingLabel:s.spacing===0?\"flat\":s.spacing.toFixed(1),\n      threshold:s.threshold, thresholdLabel:!continuous?\"n/a\":(s.threshold===0?\"off\":s.threshold.toFixed(2)),\n      highlightFront:s.highlightFront, showOutlines:s.showOutlines, autoRotate:s.autoRotate,\n      legendTitle:legendMap[s.mode], legendIsContinuous:continuous, legendIsCategorical:!continuous, legendItems,\n      onPatient:(e)=>this.setState({patient:e.target.value},()=>this.regenPatient()),\n      onPointSize:(e)=>{const v=parseFloat(e.target.value);this.setState({pointSize:v});(this.viewers||[]).forEach(vw=>{if(vw.mat)vw.mat.size=0.05*v;});},\n      onSpacing:(e)=>this.setState({spacing:parseFloat(e.target.value)},()=>this.updatePositionsAll()),\n      onThreshold:(e)=>this.setState({threshold:parseFloat(e.target.value)},()=>this.applyAll()),\n      onHighlightFront:(e)=>this.setState({highlightFront:e.target.checked},()=>this.applyAll()),\n      onOutlines:(e)=>this.setState({showOutlines:e.target.checked},()=>this.buildOutlinesAll()),\n      onAutoRotate:(e)=>this.setState({autoRotate:e.target.checked}),\n      onReset:()=>{ if(this.controls) this.controls.reset(); if(this.driver&&this.homePos) this.driver.position.copy(this.homePos); },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
